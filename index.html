<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FIERI PSL ROE Vol.4 Final</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--bg:#f3f4f6;--card:#ffffff;--border:#d1d5db;--text:#111827}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
.container{max-width:1200px;margin:0 auto;padding:16px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
label{display:block;font-size:14px;font-weight:700;margin-bottom:6px}
input,select,button{width:100%;padding:12px;margin-top:6px;margin-bottom:12px;border-radius:10px;border:1px solid #cbd5e1;font-size:16px;background:#fff}
button{cursor:pointer;font-weight:700}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.note{margin-top:8px;font-size:13px;line-height:1.6;color:#4b5563}
.error{display:none;margin-top:12px;border:1px solid #fecaca;background:#fef2f2;color:#b91c1c;border-radius:12px;padding:10px 12px;font-size:14px}
.previewScreen{display:none;position:fixed;inset:0;background:#111;z-index:999;overflow:auto}
.previewInner{min-width:1200px;min-height:100%;display:flex;align-items:center;justify-content:center;padding:40px}
#diagramWrap{display:flex;align-items:center;justify-content:center;width:100%}
#diagram{background:#fff;padding:12px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.22);transform-origin:center center}
.zoomBar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;flex-wrap:wrap;z-index:1001}
.zoomBar button{width:auto;min-width:76px}
.closeBtn{position:fixed;top:20px;right:20px;width:76px;z-index:1001}
@media (max-width:680px){.controls{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container" id="formArea">
  <div class="panel">
    <label for="controller">Controller</label>
    <select id="controller">
      <option value="CB5">CB5</option>
      <option value="CB8">CB8</option>
      <option value="V8">V8</option>
    </select>

    <label for="bit">Bit</label>
    <select id="bit">
      <option value="8">8bit</option>
      <option value="10" selected>10bit</option>
      <option value="12">12bit</option>
    </select>

    <label for="wiringMode">Wiring Mode</label>
    <select id="wiringMode">
      <option value="top">Top In</option>
      <option value="bottom">Bottom In</option>
    </select>

    <label for="cols">Width</label>
    <input id="cols" type="number" min="1" />

    <label for="rows">Height</label>
    <input id="rows" type="number" min="1" />

    <label for="xdPos">XD Position</label>
    <input id="xdPos" type="number" min="1" />

    <div class="controls">
      <button id="previewBtn" onclick="previewDiagram()" style="display:none;">Preview</button>
      <button onclick="resetForm()">Reset</button>
    </div>

    <div class="controls">
      <button id="pngBtnForm" onclick="exportPNG()" style="display:none;">PNG</button>
      <button id="pdfBtnForm" onclick="exportPDF()" style="display:none;">PDF</button>
    </div>

    <div class="note">FIERI PSL ROE Vol.4 Final / FRONT VIEW / SL Start / 最大列数ベースのポート振り分け / 余りは最後 / 再分配なし</div>
    <div class="error" id="errorBox"></div>
  </div>
</div>

<div class="previewScreen" id="previewScreen">
  <button class="closeBtn" onclick="closePreview()">✕</button>
  <div class="previewInner">
    <div id="diagramWrap"><div id="diagram"></div></div>
  </div>
  <div class="zoomBar">
    <button onclick="zoomOut()">－</button>
    <button onclick="zoomIn()">＋</button>
  </div>
</div>

<script>
const MAX_TILES = {
  CB5:{8:24,10:19,12:16},
  CB8:{8:50,10:40,12:33},
  V8:{8:50,10:40,12:33}
};

const TILE_SPECS = {
  CB5:{w:600,h:1200},
  CB8:{w:600,h:1200},
  V8:{w:1000,h:1000}
};

const PORT_COLORS = [
  '#ffb4b4','#b4dcff','#c8ffc8','#ffdc96','#dcc8ff','#ffc8c8',
  '#c8f0f0','#f0f0a0','#c8c8ff','#ffd2aa','#d2ffd2','#ffc8e6','#c8ffff'
];

const XD_W_MM = 482.6;
const XD_D_MM = 260;
const XD_GAP_MM = 200;
const XD_PAIR_GAP_MM = 150;
const XD_SET_GAP_MM = 300;

let zoom = 1;

const el = id => document.getElementById(id);
const safeInt = (v, f=1) => {
  const n = Number(v);
  return Number.isFinite(n) && n > 0 ? Math.floor(n) : f;
};
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
const isMobile = () => /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

function showError(msg){
  const box = el('errorBox');
  if(!msg){
    box.style.display = 'none';
    box.textContent = '';
    return;
  }
  box.style.display = 'block';
  box.textContent = msg;
}

function updateActionButtons(){
  const cols = el('cols').value.trim();
  const rows = el('rows').value.trim();
  const xd = el('xdPos').value.trim();
  const ready = cols !== '' && rows !== '' && xd !== '' &&
    Number(cols) > 0 && Number(rows) > 0 && Number(xd) > 0;

  el('previewBtn').style.display = ready ? 'block' : 'none';
  el('pngBtnForm').style.display = ready ? 'block' : 'none';
  el('pdfBtnForm').style.display = ready ? 'block' : 'none';
}

function resetForm(){
  el('controller').value = 'CB5';
  el('bit').value = '10';
  el('wiringMode').value = 'top';
  el('cols').value = '';
  el('rows').value = '';
  el('xdPos').value = '';
  el('diagram').innerHTML = '';
  showError('');
  updateActionButtons();
}

function roundCableLength(m){
  if(m <= 5) return 5;
  if(m <= 10) return 10;
  if(m <= 20) return 20;
  return 30;
}

function allocatePorts(controller, bit, cols, rows){
  const maxTiles = MAX_TILES[controller][bit];
  const maxColsPerPort = Math.max(1, Math.floor(maxTiles / rows));
  const colParts = [];
  let remaining = cols;
  while(remaining > 0){
    const take = Math.min(maxColsPerPort, remaining);
    colParts.push(take);
    remaining -= take;
  }
  const portSizes = colParts.map(c => c * rows);
  const labels = portSizes.map((_, i) =>
    i < 10
      ? {start:`A${i+1}`, end:`B${i+1}`, group:'AB'}
      : {start:`C${i-9}`, end:`D${i-9}`, group:'CD'}
  );
  return {maxTiles, maxColsPerPort, colParts, portSizes, labels};
}

function getPortRanges(colParts){
  let currentCol = 0;
  return colParts.map(span => {
    const startCol = currentCol;
    const endCol = currentCol + span - 1;
    currentCol += span;
    return {startCol, endCol, span};
  });
}

function endRowForSpan(span, rows, wiringMode){
  if(wiringMode === 'top') return span % 2 === 0 ? 0 : rows - 1;
  return span % 2 === 0 ? rows - 1 : 0;
}

function getHardwareCounts(cols, rows){
  return {
    twoWayHanger: Math.floor(cols / 2),
    oneWayHanger: cols % 2,
    fourLock: (cols - 1) * rows,
    twoLock: cols + 2 * rows - 1
  };
}

function getSetLayout(startRows, endRows){
  const allOpposite = endRows.length > 0 && endRows.every((r, i) => r !== startRows[i]);
  return allOpposite ? 'vertical' : 'horizontal';
}

function buildGeometry(){
  const controller = el('controller').value;
  const bit = safeInt(el('bit').value, 10);
  const wiringMode = el('wiringMode').value;
  const cols = safeInt(el('cols').value, 1);
  const rows = safeInt(el('rows').value, 1);
  const xdPos = clamp(safeInt(el('xdPos').value, 1), 1, cols);

  const tileWmm = TILE_SPECS[controller].w;
  const tileHmm = TILE_SPECS[controller].h;

  const alloc = allocatePorts(controller, bit, cols, rows);
  const ranges = getPortRanges(alloc.colParts);

  const scale = 0.18;
  const tileW = tileWmm * scale;
  const tileH = tileHmm * scale;

  const xdW = XD_W_MM * scale;
  const xdH = XD_D_MM * scale;
  const xdGap = XD_GAP_MM * scale;
  const pairGap = XD_PAIR_GAP_MM * scale;
  const setGap = XD_SET_GAP_MM * scale;

  const extraTop = xdH + xdGap + 20;
  const extraBottom = xdH + xdGap + 20;

  const boxW = 230;
  const boxGap = 8;
  const listGapToPanel = 14;
  const rightPadding = 20;
  const listBlockW = boxW * 2 + boxGap;

  const marginLeft = 60;
  const marginTop = 150 + extraTop;
  const marginBottom = 50 + extraBottom;
  const marginRight = listGapToPanel + listBlockW + rightPadding;

  const panelW = cols * tileW;
  const panelH = rows * tileH;
  const width = marginLeft + panelW + marginRight;
  const height = marginTop + panelH + marginBottom;

  const xdaCenter = marginLeft + (xdPos - 1) * tileW + tileW / 2;
  const xdaX = xdaCenter - xdW / 2;
  const xdaY = wiringMode === 'top' ? marginTop - xdGap - xdH : marginTop + panelH + xdGap;

  const abStartRows = [], abEndRows = [], cdStartRows = [], cdEndRows = [];
  ranges.forEach((r, i) => {
    const label = alloc.labels[i];
    const startRow = wiringMode === 'top' ? 0 : rows - 1;
    const endRow = endRowForSpan(r.span, rows, wiringMode);
    if(label.group === 'AB'){
      abStartRows.push(startRow);
      abEndRows.push(endRow);
    } else {
      cdStartRows.push(startRow);
      cdEndRows.push(endRow);
    }
  });

  const abLayout = getSetLayout(abStartRows, abEndRows);
  const cdLayout = getSetLayout(cdStartRows, cdEndRows);

  let xdbX, xdbY, xdcX, xdcY, xddX, xddY;
  if(abLayout === 'horizontal'){
    xdbX = xdaX + xdW + pairGap;
    xdbY = xdaY;
  } else {
    xdbX = xdaX;
    xdbY = wiringMode === 'top' ? marginTop + panelH + xdGap : marginTop - xdGap - xdH;
  }

  xdcX = (abLayout === 'horizontal' ? xdbX : xdaX) + xdW + setGap;
  xdcY = xdaY;

  if(alloc.labels.some(l => l.group === 'CD')){
    if(cdLayout === 'horizontal'){
      xddX = xdcX + xdW + pairGap;
      xddY = xdcY;
    } else {
      xddX = xdcX;
      xddY = wiringMode === 'top' ? marginTop + panelH + xdGap : marginTop - xdGap - xdH;
    }
  }

  const xdBoxes = [
    {key:'A', label:'XD A', x:xdaX, y:xdaY, cxMm:(xdaX + xdW/2 - marginLeft)/scale, cyMm:(xdaY + xdH/2 - marginTop)/scale},
    {key:'B', label:'XD B', x:xdbX, y:xdbY, cxMm:(xdbX + xdW/2 - marginLeft)/scale, cyMm:(xdbY + xdH/2 - marginTop)/scale}
  ];
  if(alloc.labels.some(l => l.group === 'CD')){
    xdBoxes.push(
      {key:'C', label:'XD C', x:xdcX, y:xdcY, cxMm:(xdcX + xdW/2 - marginLeft)/scale, cyMm:(xdcY + xdH/2 - marginTop)/scale},
      {key:'D', label:'XD D', x:xddX, y:xddY, cxMm:(xddX + xdW/2 - marginLeft)/scale, cyMm:(xddY + xdH/2 - marginTop)/scale}
    );
  }

  return {controller, bit, wiringMode, cols, rows, xdPos, tileWmm, tileHmm, alloc, ranges, tileW, tileH,
          marginLeft, marginTop, panelW, panelH, width, height, xdW, xdH, xdBoxes, boxW, boxGap, listGapToPanel};
}

function cableAndAccessoryData(geom){
  const {ranges, alloc, xdBoxes, rows, wiringMode, tileWmm, tileHmm} = geom;
  const xdMap = Object.fromEntries(xdBoxes.map(b => [b.key, b]));
  const aLengths = [], bLengths = [];
  const counts = {5:0,10:0,20:0,30:0};
  let jjCount = 0, bridgeCableCount = 0;

  ranges.forEach((r, i) => {
    const label = alloc.labels[i];
    const endRow = endRowForSpan(r.span, rows, wiringMode);

    const startX = r.startCol * tileWmm + tileWmm / 2;
    const startY = wiringMode === 'top' ? 120 : (rows * tileHmm) - 120;
    const endX = r.endCol * tileWmm + tileWmm / 2;
    const endY = endRow === 0 ? 120 : (rows * tileHmm) - 120;

    const startXd = label.group === 'AB' ? xdMap.A : xdMap.C;
    const endXd = label.group === 'AB' ? xdMap.B : xdMap.D;

    const aMeters = Math.hypot(startX - startXd.cxMm, startY - startXd.cyMm) / 1000 + 1;

    let extraVertical = 0;
    if(endXd.cyMm < 0 && endRow === rows - 1) extraVertical = rows * tileHmm;
    const bMeters = Math.hypot(endX - endXd.cxMm, endY - endXd.cyMm) / 1000 + (extraVertical / 1000) + 1;

    const aRounded = roundCableLength(aMeters);
    const bRounded = roundCableLength(bMeters);

    aLengths.push(aRounded);
    bLengths.push(bRounded);
    counts[aRounded]++; counts[bRounded]++;

    for(let rel = 0; rel < r.span - 1; rel++){
      const transitionAtBottom = wiringMode === 'top' ? (rel % 2 === 0) : (rel % 2 !== 0);
      if(transitionAtBottom) bridgeCableCount++;
      else jjCount++;
    }

    if(wiringMode === 'top'){
      jjCount += 1;
      if(endRow === 0) jjCount += 1;
    }
  });

  return {aLengths, bLengths, counts, jjCount, bridgeCableCount};
}

function buildSvg(){
  const geom = buildGeometry();
  const accessories = cableAndAccessoryData(geom);
  const hardware = getHardwareCounts(geom.cols, geom.rows);

  const {controller, bit, wiringMode, cols, rows, alloc, ranges, tileW, tileH, tileWmm, tileHmm,
         marginLeft, marginTop, panelW, panelH, width, height, xdW, xdH, xdBoxes, boxW, boxGap, listGapToPanel} = geom;

  const cx = col => marginLeft + col * tileW + tileW / 2;
  const cy = row => marginTop + row * tileH + tileH / 2;

  const totalPanels = cols * rows;
  const wallWmm = cols * tileWmm;
  const wallHmm = rows * tileHmm;

  const cableLines = [];
  if(accessories.counts[5] > 0) cableLines.push(`5 m : ${accessories.counts[5]}`);
  if(accessories.counts[10] > 0) cableLines.push(`10 m : ${accessories.counts[10]}`);
  if(accessories.counts[20] > 0) cableLines.push(`20 m : ${accessories.counts[20]}`);
  if(accessories.counts[30] > 0) cableLines.push(`30 m : ${accessories.counts[30]}`);
  if(accessories.jjCount > 0) cableLines.push(`JJ : ${accessories.jjCount}`);
  if(accessories.bridgeCableCount > 0) cableLines.push(`Bridge Cable : ${accessories.bridgeCableCount}`);

  const partsLines = [
    `2way Hanger : ${hardware.twoWayHanger}`,
    `1way Hanger : ${hardware.oneWayHanger}`,
    `4Lock : ${hardware.fourLock}`,
    `2Lock : ${hardware.twoLock}`
  ];

  const lineH = 28, topY = 18, innerTop = 48, minBoxH = 88;
  const unifiedH = Math.max(minBoxH, innerTop + Math.max(cableLines.length, partsLines.length) * lineH + 8);
  const cableX = marginLeft + panelW + listGapToPanel;
  const partsX = cableX + boxW + boxGap;

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
    <rect width="100%" height="100%" fill="white"/>
    <text x="${marginLeft}" y="38" font-size="32" font-weight="700" fill="black">FIERI PSL ROE Vol.4</text>
    <text x="${marginLeft}" y="68" font-size="22" font-weight="700" fill="black">FRONT VIEW</text>
    <text x="${marginLeft}" y="96" font-size="18" fill="black">${controller} ${bit}bit ${cols}×${rows} / ${wiringMode === 'top' ? 'Top In' : 'Bottom In'}</text>
    <text x="${marginLeft}" y="122" font-size="17" fill="black">Wall Size ${wallWmm} × ${wallHmm} mm / ${(wallWmm/1000).toFixed(1)} × ${(wallHmm/1000).toFixed(1)} m</text>
    <text x="${marginLeft}" y="146" font-size="17" fill="black">Total Panels ${totalPanels}</text>
    <text x="${marginLeft}" y="170" font-size="16" fill="black">Allocation: ${alloc.labels.map((l,i)=>`${l.start}=${alloc.portSizes[i]}`).join(' / ')}</text>`;

  svg += `<rect x="${cableX}" y="${topY}" width="${boxW}" height="${unifiedH}" fill="white" stroke="black" stroke-width="3"/>`;
  svg += `<text x="${cableX+14}" y="${topY+22}" font-size="22" font-weight="700">Cable List</text>`;
  cableLines.forEach((line, idx) => {
    svg += `<text x="${cableX+12}" y="${topY+innerTop+idx*lineH}" font-size="22">${line}</text>`;
  });

  svg += `<rect x="${partsX}" y="${topY}" width="${boxW}" height="${unifiedH}" fill="white" stroke="black" stroke-width="3"/>`;
  svg += `<text x="${partsX+14}" y="${topY+22}" font-size="22" font-weight="700">Parts List</text>`;
  partsLines.forEach((line, idx) => {
    svg += `<text x="${partsX+12}" y="${topY+innerTop+idx*lineH}" font-size="22">${line}</text>`;
  });

  ranges.forEach((r, i) => {
    const x = marginLeft + r.startCol * tileW;
    const w = (r.endCol - r.startCol + 1) * tileW;
    svg += `<rect x="${x}" y="${marginTop}" width="${w}" height="${panelH}" fill="${PORT_COLORS[i % PORT_COLORS.length]}"/>`;
  });

  for(let c = 0; c <= cols; c++){
    const x = marginLeft + c * tileW;
    svg += `<line x1="${x}" y1="${marginTop}" x2="${x}" y2="${marginTop + panelH}" stroke="black" stroke-width="${c===0||c===cols?4:2}"/>`;
  }
  for(let r = 0; r <= rows; r++){
    const y = marginTop + r * tileH;
    svg += `<line x1="${marginLeft}" y1="${y}" x2="${marginLeft + panelW}" y2="${y}" stroke="black" stroke-width="${r===0||r===rows?4:2}"/>`;
  }

  xdBoxes.forEach(box => {
    svg += `<rect x="${box.x}" y="${box.y}" width="${xdW}" height="${xdH}" fill="#f5f5f5" stroke="black" stroke-width="3"/>`;
    svg += `<text x="${box.x + xdW/2}" y="${box.y + xdH/2 + 6}" text-anchor="middle" font-size="18" font-weight="700">${box.label}</text>`;
  });

  ranges.forEach((r, i) => {
    const label = alloc.labels[i];
    const startRow = wiringMode === 'top' ? 0 : rows - 1;
    const endRow = endRowForSpan(r.span, rows, wiringMode);

    const sx = cx(r.startCol);
    const syLabel = startRow === 0 ? marginTop + 34 : marginTop + panelH - 14;
    const syMeter = startRow === 0 ? syLabel + 24 : syLabel - 24;

    const ex = cx(r.endCol);
    const eyLabel = endRow === 0 ? marginTop + 34 : marginTop + panelH - 14;
    const eyMeter = endRow === 0 ? eyLabel + 24 : eyLabel - 24;

    svg += `<text x="${sx}" y="${syLabel}" text-anchor="middle" font-size="36" font-weight="700">${label.start}</text>`;
    svg += `<text x="${sx}" y="${syMeter}" text-anchor="middle" font-size="24">${accessories.aLengths[i]}m</text>`;
    svg += `<text x="${ex}" y="${eyLabel}" text-anchor="middle" font-size="36" font-weight="700">${label.end}</text>`;
    svg += `<text x="${ex}" y="${eyMeter}" text-anchor="middle" font-size="24">${accessories.bLengths[i]}m</text>`;

    const pts = [];
    for(let col = r.startCol; col <= r.endCol; col++){
      const rel = col - r.startCol;
      let order;
      if(wiringMode === 'top'){
        order = rel % 2 === 0 ? [...Array(rows).keys()] : [...Array(rows).keys()].reverse();
      } else {
        order = rel % 2 === 0 ? [...Array(rows).keys()].reverse() : [...Array(rows).keys()];
      }
      order.forEach(row => pts.push(`${cx(col)},${cy(row)}`));
    }
    svg += `<polyline fill="none" stroke="black" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" points="${pts.join(' ')}"/>`;
  });

  svg += `</svg>`;
  return svg;
}

function draw(){ el('diagram').innerHTML = buildSvg(); }
function applyZoom(){ el('diagram').style.transform = `scale(${zoom})`; }

function autoFit(){
  const svg = document.querySelector('#diagram svg');
  if(!svg) return;
  const screenW = window.innerWidth - 60;
  const screenH = window.innerHeight - 90;
  const svgW = svg.width.baseVal.value;
  const svgH = svg.height.baseVal.value;
  zoom = Math.min(screenW / svgW, screenH / svgH, 1);
  applyZoom();
}

function previewDiagram(){
  showError('');
  draw();
  el('formArea').style.display = 'none';
  el('previewScreen').style.display = 'block';
  requestAnimationFrame(() => {
    autoFit();
    const screen = el('previewScreen');
    const wrap = el('diagramWrap');
    const left = Math.max(0, (wrap.scrollWidth - window.innerWidth) / 2);
    const top = Math.max(0, (wrap.scrollHeight - window.innerHeight) / 2);
    screen.scrollTo({left, top, behavior:'auto'});
  });
}

function closePreview(){
  el('previewScreen').style.display = 'none';
  el('formArea').style.display = 'block';
}

function zoomIn(){ zoom += 0.1; applyZoom(); }
function zoomOut(){ zoom = Math.max(0.2, zoom - 0.1); applyZoom(); }

function triggerDownloadFromBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

async function renderSvgCanvas(){
  draw();
  const svg = document.querySelector('#diagram svg');
  const svgText = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([svgText], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  const canvas = document.createElement('canvas');
  canvas.width = svg.viewBox.baseVal.width * 2;
  canvas.height = svg.viewBox.baseVal.height * 2;
  const ctx = canvas.getContext('2d');

  await new Promise((resolve, reject) => {
    img.onload = () => {
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      resolve();
    };
    img.onerror = reject;
    img.src = url;
  });

  URL.revokeObjectURL(url);
  return canvas;
}

async function exportPNG(){
  try{
    const canvas = await renderSvgCanvas();
    canvas.toBlob(blob => {
      if(!blob){ showError('PNG export failed.'); return; }
      if(isMobile()){
        const url = URL.createObjectURL(blob);
        window.open(url,'_blank');
        setTimeout(()=>URL.revokeObjectURL(url),10000);
      }else{
        triggerDownloadFromBlob(blob,'fieri_psl_roe_vol4_final.png');
      }
    }, 'image/png');
  }catch(err){
    console.error(err);
    showError('PNG export failed.');
  }
}

async function exportPDF(){
  try{
    const canvas = await renderSvgCanvas();
    const img = canvas.toDataURL('image/png');
    const {jsPDF} = window.jspdf;
    const pdf = new jsPDF({orientation:'landscape'});
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 8;
    const ratio = Math.min((pageW - margin * 2) / canvas.width, (pageH - margin * 2) / canvas.height);
    const w = canvas.width * ratio;
    const h = canvas.height * ratio;
    pdf.addImage(img,'PNG',(pageW-w)/2,(pageH-h)/2,w,h);

    if(isMobile()){
      const blob = pdf.output('blob');
      const url = URL.createObjectURL(blob);
      window.open(url,'_blank');
      setTimeout(()=>URL.revokeObjectURL(url),10000);
    }else{
      pdf.save('fieri_psl_roe_vol4_final.pdf');
    }
  }catch(err){
    console.error(err);
    showError('PDF export failed.');
  }
}

['cols','rows','xdPos'].forEach(id => {
  el(id).addEventListener('input', updateActionButtons);
  el(id).addEventListener('change', updateActionButtons);
});
updateActionButtons();
