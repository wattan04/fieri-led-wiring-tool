<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FIERI PSL ROE Vol.3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#f3f4f6;
  --card:#fff;
  --border:#d1d5db;
  --text:#111827;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}
.container{max-width:1200px;margin:0 auto;padding:16px}
.panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}
label{display:block;font-size:14px;font-weight:700;margin-bottom:6px}
input,select,button{
  width:100%;
  padding:12px;
  margin-top:6px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  font-size:16px;
  background:#fff;
}
button{cursor:pointer;font-weight:700}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.note{margin-top:8px;font-size:13px;line-height:1.6;color:#4b5563}
.error{
  display:none;
  margin-top:12px;
  border:1px solid #fecaca;
  background:#fef2f2;
  color:#b91c1c;
  border-radius:12px;
  padding:10px 12px;
  font-size:14px;
}
.previewScreen{
  display:none;
  position:fixed;
  inset:0;
  background:#111;
  z-index:999;
  overflow:auto;
}
.previewInner{
  min-width:1200px;
  min-height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px;
}
#diagram{
  background:#fff;
  padding:20px;
  border-radius:12px;
  transform-origin:center center;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}
.zoomBar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.zoomBar button{width:auto;min-width:76px}
.closeBtn{
  position:fixed;
  top:20px;
  right:20px;
  width:76px;
}
@media (max-width:680px){
  .controls{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container" id="formArea">
  <div class="panel">
    <label for="controller">Controller</label>
    <select id="controller">
      <option value="CB5">CB5</option>
      <option value="CB8">CB8</option>
      <option value="V8">V8</option>
    </select>

    <label for="bit">Bit</label>
    <select id="bit">
      <option value="8">8bit</option>
      <option value="10" selected>10bit</option>
      <option value="12">12bit</option>
    </select>

    <label for="wiringMode">Wiring Mode</label>
    <select id="wiringMode">
      <option value="top">Top In</option>
      <option value="bottom">Bottom In</option>
    </select>

    <label for="cols">Width</label>
    <input id="cols" type="number" min="1" value="" />

    <label for="rows">Height</label>
    <input id="rows" type="number" min="1" value="" />

    <label for="xdPos">XD Position</label>
    <input id="xdPos" type="number" min="1" value="" />

    <div class="controls">
      <button id="previewBtn" onclick="previewDiagram()" style="display:none;">Preview</button>
      <button onclick="resetForm()">Reset</button>
    </div>

    <div class="controls">
      <button id="pngBtnForm" onclick="exportPNG()" style="display:none;">PNG</button>
      <button id="pdfBtnForm" onclick="exportPDF()" style="display:none;">PDF</button>
    </div>

    <div class="note">
      FIERI PSL ROE Vol.3 / Previewで配線図のみ表示。プレビュー画面では自動フィット、中央表示、拡大縮小が可能。
    </div>
    <div class="error" id="errorBox"></div>
  </div>
</div>

<div class="previewScreen" id="previewScreen">
  <button class="closeBtn" onclick="closePreview()">✕</button>
  <div class="previewInner">
    <div id="diagram"></div>
  </div>
  <div class="zoomBar">
    <button onclick="zoomOut()">－</button>
    <button onclick="zoomIn()">＋</button>
  </div>
</div>

<script>
const MAX_TILES = {
  CB5: {8:24, 10:19, 12:16},
  CB8: {8:50, 10:40, 12:33},
  V8:  {8:50, 10:40, 12:33}
};

const TILE_SPECS = {
  CB5: {w:600, h:1200},
  CB8: {w:600, h:1200},
  V8:  {w:1000, h:1000}
};

const PORT_COLORS = [
  '#ffb4b4','#b4dcff','#c8ffc8','#ffdc96','#dcc8ff','#ffc8c8',
  '#c8f0f0','#f0f0a0','#c8c8ff','#ffd2aa','#d2ffd2','#ffc8e6','#c8ffff'
];

const XD_W_MM = 482.6;
const XD_D_MM = 260;
const XD_GAP_MM = 200;
const XD_PAIR_GAP_MM = 150;
const XD_SET_GAP_MM = 300;

let zoom = 1;

const el = id => document.getElementById(id);
const safeInt = (v, f=1) => {
  const n = Number(v);
  return Number.isFinite(n) && n > 0 ? Math.floor(n) : f;
};
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

function showError(msg){
  const box = el('errorBox');
  if(!msg){
    box.style.display = 'none';
    box.textContent = '';
    return;
  }
  box.style.display = 'block';
  box.textContent = msg;
}

function updateActionButtons(){
  const cols = el('cols').value.trim();
  const rows = el('rows').value.trim();
  const xd = el('xdPos').value.trim();
  const ready = cols !== '' && rows !== '' && xd !== '' &&
    Number(cols) > 0 && Number(rows) > 0 && Number(xd) > 0;

  el('previewBtn').style.display = ready ? 'block' : 'none';
  el('pngBtnForm').style.display = ready ? 'block' : 'none';
  el('pdfBtnForm').style.display = ready ? 'block' : 'none';
}

function resetForm(){
  el('controller').value = 'CB5';
  el('bit').value = '10';
  el('wiringMode').value = 'top';
  el('cols').value = '';
  el('rows').value = '';
  el('xdPos').value = '';
  el('diagram').innerHTML = '';
  showError('');
  updateActionButtons();
}

function roundCableLength(m){
  if(m <= 5) return 5;
  if(m <= 10) return 10;
  if(m <= 20) return 20;
  return 30;
}

function scorePartition(parts, avg){
  let evenCount = 0, sumSq = 0, range = Math.max(...parts) - Math.min(...parts);
  for(const p of parts){
    if(p % 2 === 0) evenCount++;
    sumSq += (p - avg) * (p - avg);
  }
  return {evenCount, sumSq, range};
}
function betterScore(a, b){
  if(a.evenCount !== b.evenCount) return a.evenCount > b.evenCount;
  if(a.sumSq !== b.sumSq) return a.sumSq < b.sumSq;
  return a.range < b.range;
}

function distributeRemainder(baseColumns, portCount, remainder){
  const parts = Array(portCount).fill(baseColumns);
  if(remainder <= 0) return parts;

  if(remainder > baseColumns){
    parts[0] += remainder;
  }else{
    parts[portCount - 1] += remainder;
  }
  return parts;
}

function findBestPartition(totalCols, maxColsPerPort){
  const minPorts = Math.ceil(totalCols / maxColsPerPort);
  const baseColumns = Math.floor(totalCols / minPorts);
  const remainder = totalCols % minPorts;
  const simpleParts = distributeRemainder(baseColumns, minPorts, remainder);

  if(simpleParts.every(p => p >= 1 && p <= maxColsPerPort)){
    return simpleParts;
  }

  const avg = totalCols / minPorts;
  const memo = new Map();

  function solve(remCols, remPorts){
    const key = `${remCols}|${remPorts}`;
    if(memo.has(key)) return memo.get(key);

    if(remPorts === 1){
      const ok = remCols >= 1 && remCols <= maxColsPerPort;
      const res = ok
        ? {ok:true, parts:[remCols], score:scorePartition([remCols], avg)}
        : {ok:false};
      memo.set(key, res);
      return res;
    }

    let best = {ok:false};
    const minThis = Math.max(1, remCols - maxColsPerPort * (remPorts - 1));
    const maxThis = Math.min(maxColsPerPort, remCols - (remPorts - 1));

    for(let take = minThis; take <= maxThis; take++){
      const next = solve(remCols - take, remPorts - 1);
      if(!next.ok) continue;
      const parts = [take, ...next.parts];
      const score = scorePartition(parts, avg);
      if(!best.ok || betterScore(score, best.score)){
        best = {ok:true, parts, score};
      }
    }
    memo.set(key, best);
    return best;
  }

  const res = solve(totalCols, minPorts);
  return res.ok ? res.parts : simpleParts;
}

function allocatePorts(controller, bit, cols, rows){
  const maxTiles = MAX_TILES[controller][bit];
  const maxColsPerPort = Math.max(1, Math.floor(maxTiles / rows));
  const colParts = findBestPartition(cols, maxColsPerPort);
  const portSizes = colParts.map(c => c * rows);
  const labels = portSizes.map((_, i) => i < 10
    ? {start:`A${i+1}`, end:`B${i+1}`, group:'AB'}
    : {start:`C${i-9}`, end:`D${i-9}`, group:'CD'}
  );
  return {maxTiles, maxColsPerPort, colParts, portSizes, labels};
}

function getPortRanges(colParts){
  let currentCol = 0;
  return colParts.map(span => {
    const startCol = currentCol;
    const endCol = currentCol + span - 1;
    currentCol += span;
    return {startCol, endCol, span};
  });
}

function endRowForSpan(span, rows, wiringMode){
  if(wiringMode === 'top'){
    return span % 2 === 0 ? 0 : rows - 1;
  }
  return span % 2 === 0 ? rows - 1 : 0;
}

function buildGeometry(){
  const controller = el('controller').value;
  const bit = safeInt(el('bit').value, 10);
  const wiringMode = el('wiringMode').value;
  const cols = safeInt(el('cols').value, 1);
  const rows = safeInt(el('rows').value, 1);
  const xdPos = clamp(safeInt(el('xdPos').value, 1), 1, cols);

  const tileWmm = TILE_SPECS[controller].w;
  const tileHmm = TILE_SPECS[controller].h;

  const alloc = allocatePorts(controller, bit, cols, rows);
  const ranges = getPortRanges(alloc.colParts);

  const scale = 0.18;
  const tileW = tileWmm * scale;
  const tileH = tileHmm * scale;

  const marginLeft = 90;
  const marginTop = 220;
  const marginRight = 380;
  const marginBottom = 120;

  const panelW = cols * tileW;
  const panelH = rows * tileH;
  const width = marginLeft + panelW + marginRight;
  const height = marginTop + panelH + marginBottom;

  const xdW = XD_W_MM * scale;
  const xdH = XD_D_MM * scale;
  const xdGap = XD_GAP_MM * scale;
  const pairGap = XD_PAIR_GAP_MM * scale;
  const setGap = XD_SET_GAP_MM * scale;

  const xdaCenter = marginLeft + (xdPos - 1) * tileW + tileW / 2;
  const xdaX = xdaCenter - xdW / 2;
  const xdaY = wiringMode === 'top' ? marginTop - xdGap - xdH : marginTop + panelH + xdGap;

  const needCD = alloc.labels.some(l => l.group === 'CD');

  const abEndRows = ranges
    .map((r, i) => alloc.labels[i].group === 'AB' ? endRowForSpan(r.span, rows, wiringMode) : null)
    .filter(v => v !== null);
  const cdEndRows = ranges
    .map((r, i) => alloc.labels[i].group === 'CD' ? endRowForSpan(r.span, rows, wiringMode) : null)
    .filter(v => v !== null);

  const targetRow = wiringMode === 'top' ? 0 : rows - 1;
  const abAllTarget = abEndRows.length > 0 && abEndRows.every(v => v === targetRow);
  const cdAllTarget = cdEndRows.length > 0 && cdEndRows.every(v => v === targetRow);

  let xdbX, xdbY, xdcX, xdcY, xddX, xddY;
  if(wiringMode === 'top'){
    xdbX = abAllTarget ? xdaX + xdW + pairGap : xdaX;
    xdbY = abAllTarget ? xdaY : marginTop + panelH + xdGap;
    xdcX = xdbX + xdW + setGap;
    xdcY = xdaY;
    xddX = cdAllTarget ? xdcX + xdW + pairGap : xdcX;
    xddY = cdAllTarget ? xdaY : marginTop + panelH + xdGap;
  }else{
    xdbX = abAllTarget ? xdaX + xdW + pairGap : xdaX;
    xdbY = abAllTarget ? xdaY : marginTop - xdGap - xdH;
    xdcX = xdbX + xdW + setGap;
    xdcY = xdaY;
    xddX = cdAllTarget ? xdcX + xdW + pairGap : xdcX;
    xddY = cdAllTarget ? xdaY : marginTop - xdGap - xdH;
  }

  const xdBoxes = [
    {key:'A', label:'XD A', x:xdaX, y:xdaY, cxMm:(xdaX + xdW/2 - marginLeft)/scale, cyMm:(xdaY + xdH/2 - marginTop)/scale},
    {key:'B', label:'XD B', x:xdbX, y:xdbY, cxMm:(xdbX + xdW/2 - marginLeft)/scale, cyMm:(xdbY + xdH/2 - marginTop)/scale}
  ];

  if(needCD){
    xdBoxes.push(
      {key:'C', label:'XD C', x:xdcX, y:xdcY, cxMm:(xdcX + xdW/2 - marginLeft)/scale, cyMm:(xdcY + xdH/2 - marginTop)/scale},
      {key:'D', label:'XD D', x:xddX, y:xddY, cxMm:(xddX + xdW/2 - marginLeft)/scale, cyMm:(xddY + xdH/2 - marginTop)/scale}
    );
  }

  return {
    controller, bit, wiringMode, cols, rows, xdPos,
    tileWmm, tileHmm,
    alloc, ranges, tileW, tileH,
    marginLeft, marginTop, panelW, panelH, width, height, xdW, xdH, xdBoxes
  };
}

function cableAndAccessoryData(geom){
  const {ranges, alloc, xdBoxes, rows, wiringMode, tileWmm, tileHmm} = geom;
  const xdMap = Object.fromEntries(xdBoxes.map(b => [b.key, b]));
  const aLengths = [], bLengths = [], counts = {5:0,10:0,20:0,30:0};
  let jjCount = 0, crossoverCount = 0;

  ranges.forEach((r, i) => {
    const label = alloc.labels[i];
    const endRow = endRowForSpan(r.span, rows, wiringMode);

    const startX = r.startCol * tileWmm + tileWmm / 2;
    const startY = wiringMode === 'top' ? 120 : (rows * tileHmm) - 120;
    const endX = r.endCol * tileWmm + tileWmm / 2;
    const endY = endRow === 0 ? 120 : (rows * tileHmm) - 120;

    const startXd = label.group === 'AB' ? xdMap.A : xdMap.C;
    const endXd = label.group === 'AB' ? xdMap.B : xdMap.D;

    const aMeters = Math.hypot(startX - startXd.cxMm, startY - startXd.cyMm) / 1000 + 1;

    let extraVertical = 0;
    if(endXd.cyMm < 0 && endRow === rows - 1) extraVertical = rows * tileHmm;

    const bMeters = Math.hypot(endX - endXd.cxMm, endY - endXd.cyMm) / 1000 + (extraVertical / 1000) + 1;

    const aRounded = roundCableLength(aMeters);
    const bRounded = roundCableLength(bMeters);

    aLengths.push(aRounded);
    bLengths.push(bRounded);
    counts[aRounded]++;
    counts[bRounded]++;

    for(let rel = 0; rel < r.span - 1; rel++){
      const transitionAtBottom = wiringMode === 'top' ? (rel % 2 === 0) : (rel % 2 !== 0);
      if(transitionAtBottom) crossoverCount++;
      else jjCount++;
    }
  });

  return {aLengths, bLengths, counts, jjCount, crossoverCount};
}

function buildSvg(){
  const geom = buildGeometry();
  const accessories = cableAndAccessoryData(geom);

  const {controller, bit, wiringMode, cols, rows, alloc, ranges, tileW, tileH, tileWmm, tileHmm, marginLeft, marginTop, panelW, panelH, width, height, xdW, xdH, xdBoxes} = geom;
  const cx = col => marginLeft + col * tileW + tileW / 2;
  const cy = row => marginTop + row * tileH + tileH / 2;

  const totalPanels = cols * rows;
  const wallWmm = cols * tileWmm;
  const wallHmm = rows * tileHmm;

  const listLines = [];
  if(accessories.counts[5] > 0) listLines.push(`5 m : ${accessories.counts[5]}`);
  if(accessories.counts[10] > 0) listLines.push(`10 m : ${accessories.counts[10]}`);
  if(accessories.counts[20] > 0) listLines.push(`20 m : ${accessories.counts[20]}`);
  if(accessories.counts[30] > 0) listLines.push(`30 m : ${accessories.counts[30]}`);
  if(accessories.jjCount > 0) listLines.push(`JJ : ${accessories.jjCount}`);
  if(accessories.crossoverCount > 0) listLines.push(`Crossover : ${accessories.crossoverCount}`);

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
    <rect width="100%" height="100%" fill="white"/>
    <text x="${marginLeft}" y="36" font-size="30" font-weight="700" fill="black">FIERI PSL ROE Vol.3</text>
    <text x="${marginLeft}" y="72" font-size="20" fill="black">${controller} ${bit}bit ${cols}×${rows} / ${wiringMode === 'top' ? 'Top In' : 'Bottom In'}</text>
    <text x="${marginLeft}" y="102" font-size="18" fill="black">Wall Size ${wallWmm} × ${wallHmm} mm / ${(wallWmm/1000).toFixed(1)} × ${(wallHmm/1000).toFixed(1)} m</text>
    <text x="${marginLeft}" y="128" font-size="18" fill="black">Total Panels ${totalPanels}</text>
    <text x="${marginLeft}" y="154" font-size="16" fill="black">Allocation: ${alloc.labels.map((l,i)=>`${l.start}=${alloc.portSizes[i]}`).join(' / ')}</text>`;

  ranges.forEach((r, i) => {
    const x = marginLeft + r.startCol * tileW;
    const w = (r.endCol - r.startCol + 1) * tileW;
    svg += `<rect x="${x}" y="${marginTop}" width="${w}" height="${panelH}" fill="${PORT_COLORS[i % PORT_COLORS.length]}"/>`;
  });

  for(let c = 0; c <= cols; c++){
    const x = marginLeft + c * tileW;
    svg += `<line x1="${x}" y1="${marginTop}" x2="${x}" y2="${marginTop + panelH}" stroke="black" stroke-width="${c===0||c===cols?4:2}"/>`;
  }
  for(let r = 0; r <= rows; r++){
    const y = marginTop + r * tileH;
    svg += `<line x1="${marginLeft}" y1="${y}" x2="${marginLeft + panelW}" y2="${y}" stroke="black" stroke-width="${r===0||r===rows?4:2}"/>`;
  }

  xdBoxes.forEach(box => {
    svg += `<rect x="${box.x}" y="${box.y}" width="${xdW}" height="${xdH}" fill="#f5f5f5" stroke="black" stroke-width="3"/>`;
    svg += `<text x="${box.x + xdW/2}" y="${box.y + xdH/2 + 6}" text-anchor="middle" font-size="18" font-weight="700">${box.label}</text>`;
  });

  ranges.forEach((r, i) => {
    const label = alloc.labels[i];
    const startRow = wiringMode === 'top' ? 0 : rows - 1;
    const endRow = endRowForSpan(r.span, rows, wiringMode);

    const sx = cx(r.startCol);
    const syLabel = startRow === 0 ? marginTop + 28 : marginTop + panelH - 12;
    const syMeter = startRow === 0 ? syLabel + 24 : syLabel - 24;

    const ex = cx(r.endCol);
    const eyLabel = endRow === 0 ? marginTop + 28 : marginTop + panelH - 12;
    const eyMeter = endRow === 0 ? eyLabel + 24 : eyLabel - 24;

    svg += `<text x="${sx}" y="${syLabel}" text-anchor="middle" font-size="24" font-weight="700">${label.start}</text>`;
    svg += `<text x="${sx}" y="${syMeter}" text-anchor="middle" font-size="18">${accessories.aLengths[i]}m</text>`;
    svg += `<text x="${ex}" y="${eyLabel}" text-anchor="middle" font-size="24" font-weight="700">${label.end}</text>`;
    svg += `<text x="${ex}" y="${eyMeter}" text-anchor="middle" font-size="18">${accessories.bLengths[i]}m</text>`;

    const pts = [];
    for(let col = r.startCol; col <= r.endCol; col++){
      const rel = col - r.startCol;
      let order;
      if(wiringMode === 'top'){
        order = rel % 2 === 0 ? [...Array(rows).keys()] : [...Array(rows).keys()].reverse();
      }else{
        order = rel % 2 === 0 ? [...Array(rows).keys()].reverse() : [...Array(rows).keys()];
      }
      order.forEach(row => pts.push(`${cx(col)},${cy(row)}`));
    }
    svg += `<polyline fill="none" stroke="black" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" points="${pts.join(' ')}"/>`;
  });

  const listX = marginLeft + panelW + 28;
  const listY = 170;
  const listH = Math.max(90, 52 + listLines.length * 34);
  svg += `<rect x="${listX}" y="${listY}" width="290" height="${listH}" fill="white" stroke="black" stroke-width="3"/>`;
  svg += `<text x="${listX + 20}" y="${listY + 30}" font-size="26" font-weight="700">Cable List</text>`;
  listLines.forEach((line, idx) => {
    svg += `<text x="${listX + 26}" y="${listY + 68 + idx * 34}" font-size="24">${line}</text>`;
  });

  svg += `</svg>`;
  return svg;
}

function draw(){
  el('diagram').innerHTML = buildSvg();
}
function applyZoom(){
  el('diagram').style.transform = `scale(${zoom})`;
}
function autoFit(){
  const svg = document.querySelector('#diagram svg');
  if(!svg) return;
  const screenW = window.innerWidth - 80;
  const screenH = window.innerHeight - 120;
  const svgW = svg.width.baseVal.value;
  const svgH = svg.height.baseVal.value;
  zoom = Math.min(screenW / svgW, screenH / svgH, 1);
  applyZoom();
}
function previewDiagram(){
  showError('');
  draw();
  el('formArea').style.display = 'none';
  el('previewScreen').style.display = 'block';
  requestAnimationFrame(() => {
    autoFit();
    const screen = el('previewScreen');
    const inner = document.querySelector('.previewInner');
    const targetLeft = Math.max(0, (inner.scrollWidth - window.innerWidth) / 2 - 20);
    const targetTop = Math.max(0, (inner.scrollHeight - window.innerHeight) / 2 - 20);
    screen.scrollTo({left: targetLeft, top: targetTop, behavior: 'auto'});
  });
}
function closePreview(){
  el('previewScreen').style.display = 'none';
  el('formArea').style.display = 'block';
}
function zoomIn(){ zoom += 0.1; applyZoom(); }
function zoomOut(){ zoom = Math.max(0.2, zoom - 0.1); applyZoom(); }

async function exportPNG(){
  try{
    draw();
    const canvas = await html2canvas(el('diagram'), {backgroundColor:'#ffffff', scale:2, useCORS:true});
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'fieri_psl_roe_vol3.png';
    a.click();
  }catch(err){
    console.error(err);
    showError('PNG export failed.');
  }
}
async function exportPDF(){
  try{
    draw();
    const canvas = await html2canvas(el('diagram'), {backgroundColor:'#ffffff', scale:2, useCORS:true});
    const img = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation:'landscape'});
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const ratio = Math.min(pageW / canvas.width, pageH / canvas.height);
    const w = canvas.width * ratio;
    const h = canvas.height * ratio;
    pdf.addImage(img, 'PNG', (pageW - w)/2, (pageH - h)/2, w, h);
    pdf.save('fieri_psl_roe_vol3.pdf');
  }catch(err){
    console.error(err);
    showError('PDF export failed.');
  }
}

['cols','rows','xdPos'].forEach(id => {
  el(id).addEventListener('input', updateActionButtons);
  el(id).addEventListener('change', updateActionButtons);
});
